server:
  port: 8080

spring:
  application:
    name: book-backend

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:book_db}?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true

jwt:
  secret: ${JWT_SECRET:local-development-secret-key-for-aivle-book-backend-auth}
  expiration: 3600000 # 토큰 유효기간 1시간

openai:
  api-key: ${OPENAI_API_KEY}
